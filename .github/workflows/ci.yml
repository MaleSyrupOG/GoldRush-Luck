name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict)
        run: uv run mypy --strict deathroll_core deathroll_luck deathroll_deposit_withdraw

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit --strict

      - name: Unit tests
        run: uv run pytest tests/unit -v

      - name: Integration tests
        env:
          POSTGRES_DSN: postgresql://test:test@localhost:5432/test
        run: uv run pytest tests/integration -v

      - name: Property tests
        run: uv run pytest tests/property -v

      - name: Coverage gates — critical core modules (≥ 95 %)
        run: |
          uv run pytest --cov=deathroll_core/balance --cov-fail-under=95 tests/
          uv run pytest --cov=deathroll_core/fairness --cov-fail-under=95 tests/
          uv run pytest --cov=deathroll_core/audit --cov-fail-under=95 tests/

      - name: Coverage gate — D/W tickets (≥ 95 %)
        run: uv run pytest --cov=deathroll_deposit_withdraw/tickets --cov-fail-under=95 tests/

      - name: Coverage gate — D/W cashiers (≥ 90 %)
        run: uv run pytest --cov=deathroll_deposit_withdraw/cashiers --cov-fail-under=90 tests/

      - name: Coverage gate — D/W admin cog (≥ 90 %, conditional on file existing)
        if: hashFiles('deathroll_deposit_withdraw/commands/admin_cog.py') != ''
        run: uv run pytest --cov=deathroll_deposit_withdraw/commands/admin_cog --cov-fail-under=90 tests/

      - name: Coverage gate — rest of D/W (≥ 85 %)
        run: uv run pytest --cov=deathroll_deposit_withdraw --cov-fail-under=85 tests/

      - name: Coverage gate — Luck games (≥ 90 %)
        run: uv run pytest --cov=deathroll_luck/games --cov-fail-under=90 tests/

      - name: Coverage gate — Luck admin (≥ 85 %)
        run: uv run pytest --cov=deathroll_luck/admin --cov-fail-under=85 tests/

      - name: Coverage gate — global (informational, raised over time)
        run: uv run pytest --cov=. --cov-fail-under=0 tests/

      - name: Cross-bot integration tests
        run: uv run pytest tests/integration/cross_bot -v
