; Alembic configuration for the DeathRoll monorepo.
; All schema migrations (core, fairness, luck, dw, poker) live in ops/alembic/versions/
; and run as the deathroll_admin role.

[alembic]
script_location = .
prepend_sys_path = .
sqlalchemy.url = ${POSTGRES_DSN_ADMIN}

; Migration filenames are prefixed with the schema area: core_*, fairness_*, luck_*, dw_*, poker_*
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
